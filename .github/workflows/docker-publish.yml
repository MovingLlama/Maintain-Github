name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository_owner }}/maintain-github-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository_owner }}/maintain-github-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')

          # Fetch auto-generated release notes from the GitHub API
          PAYLOAD=$(jq -n \
            --arg tag "$TAG" \
            --arg prev "$PREV_TAG" \
            '{tag_name: $tag, previous_tag_name: (if $prev != "" then $prev else null end)}')

          GENERATED=$(gh api "repos/${REPO}/releases/generate-notes" \
            --method POST \
            --input <(echo "$PAYLOAD") \
            --jq '.body')

          # Combine Docker image table with the generated changelog
          cat > release-notes.md << EOF
          ## Docker Images

          | Image | Tag |
          |-------|-----|
          | \`ghcr.io/${OWNER}/maintain-github-backend\` | \`${TAG}\` |
          | \`ghcr.io/${OWNER}/maintain-github-frontend\` | \`${TAG}\` |

          ### Quick Start

          \`\`\`bash
          docker pull ghcr.io/${OWNER}/maintain-github-backend:${TAG}
          docker pull ghcr.io/${OWNER}/maintain-github-frontend:${TAG}
          \`\`\`

          ---

          ${GENERATED}
          EOF

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md
